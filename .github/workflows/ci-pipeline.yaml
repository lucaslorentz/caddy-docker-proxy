name: CI Pipeline

on:
  push:
    branches:
      - 'master'
    tags:
      - '*'
  pull_request:

jobs:
  build_binaries:
    name: Build Binaries
    runs-on: ubuntu-24.04

    steps:
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.24.4

      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Build
        run: |
          export PATH="$GOBIN:$PATH"
          . build.sh
        env:
          ARTIFACTS: ${{ runner.temp }}/artifacts
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v5
        with:
          name: binaries
          path: ${{ runner.temp }}/artifacts/binaries

  linux:
    name: Linux
    runs-on: ubuntu-24.04
    needs: build_binaries

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: binaries
          path: artifacts/binaries

      - name: Run Docker Tests
        run: . run-docker-tests-linux.sh
        shell: bash

      - name: Build Docker Images
        run: ./build-images-linux.sh
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        shell: bash

  windows:
    name: Windows
    runs-on: windows-2022
    needs: build_binaries

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Download Build Artifacts
        uses: actions/download-artifact@v5
        with:
          name: binaries
          path: artifacts/binaries

      # Uncomment this step if needed once windows docker tests are implemented
      # - name: Run Docker Tests (Windows)
      #   run: .\run-docker-tests-windows.sh
      #   shell: bash

      # Workaround for actions/runner-images#13729: the Docker daemon is
      # frequently not running when the windows-2022 runner starts, causing
      # `npipe:////./pipe/docker_engine` connection failures. Start the
      # service and wait for it to become responsive before building.
      - name: Ensure Docker is running (Windows)
        shell: pwsh
        run: |
          Start-Service docker
          for ($i = 0; $i -lt 30; $i++) {
            docker info *> $null
            if ($LASTEXITCODE -eq 0) { exit 0 }
            Start-Sleep 2
          }
          docker info

      - name: Build Docker Images
        run: ./build-images-windows.sh
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        shell: bash
